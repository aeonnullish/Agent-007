<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track the Sats</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* Behåller din snygga design */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#060608;color:#e2e2e8;font-family:'Outfit',sans-serif;min-height:100vh}
header{padding:12px 20px;border-bottom:1px solid rgba(249,115,22,0.1);background:rgba(6,6,8,0.95)}
main{max-width:600px;margin:0 auto;padding:24px 16px}
.start-form{background:#0e0e14;border:1px solid rgba(249,115,22,0.15);border-radius:14px;padding:20px}
.fi{width:100%;background:#060608;border:1px solid rgba(249,115,22,0.12);border-radius:8px;padding:11px;color:#e2e2e8;margin-bottom:14px}
.btn{width:100%;background:#f97316;color:#000;border:none;border-radius:8px;padding:13px;font-weight:800;cursor:pointer}
.err{color:#ef4444;font-size:0.7rem;margin-top:10px;display:none}
#chain{margin-top:20px}
.tx-card{background:#0e0e14;padding:15px;border-radius:14px;margin-bottom:10px;border:1px solid rgba(249,115,22,0.1)}
</style>
</head>
<body>
<header><div style="color:#f97316;font-weight:900">TRACK THE SATS</div></header>
<main>
  <div class="start-form" id="start-form">
    <input class="fi" id="tx-input" placeholder="Paste OP_NET TX ID..."/>
    <button class="btn" onclick="startInvestigation()">Investigate</button>
    <div class="err" id="error-msg"></div>
  </div>
  <div id="chain"></div>
</main>

<script>
// Din Worker-URL (se till att denna är exakt rätt)
const PROXY_URL = 'https://trackproxy.aeonnullish.workers.dev';

async function startInvestigation() {
  const txid = document.getElementById('tx-input').value.trim();
  const errEl = document.getElementById('error-msg');
  if (!txid) return;

  errEl.style.display = 'none';
  try {
    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        jsonrpc: '2.0',
        id: 1,
        method: 'btc_getTransactionByHash',
        params: [txid]
      })
    });

    if (!res.ok) throw new Error('Network error: ' + res.status);
    
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    
    renderResult(txid, data.result);
  } catch (e) {
    errEl.textContent = 'Error: ' + e.message;
    errEl.style.display = 'block';
  }
}

function renderResult(txid, result) {
  const chain = document.getElementById('chain');
  chain.innerHTML = `
    <div class="tx-card">
      <div style="font-size:0.6rem;color:#f97316">TX ID</div>
      <div style="font-size:0.7rem;word-break:break-all">${txid}</div>
      <div style="margin-top:10px;font-size:0.6rem;color:#f97316">BLOCK</div>
      <div>${parseInt(result.blockNumber || 0, 16)}</div>
    </div>
  `;
}
</script>
</body>
</html>
