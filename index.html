<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">

<title>Orditrack — by Nodebirds</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#060608!important;color:#e2e2e8!important;font-family:'Jost',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% -5%,rgba(249,115,22,0.07),transparent 60%);pointer-events:none;z-index:0}
.grid{position:fixed;inset:0;background-image:linear-gradient(rgba(249,115,22,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(249,115,22,0.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
header{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid rgba(249,115,22,0.1);background:rgba(6,6,8,0.92);backdrop-filter:blur(20px)}
.logo{display:flex;align-items:center;gap:10px}
.logo img{width:36px;height:36px;image-rendering:pixelated}
.logo-title{font-size:0.78rem;font-weight:800;letter-spacing:0.08em;color:#f97316;text-transform:uppercase}

.badge{font-family:'Share Tech Mono',monospace;font-size:0.58rem;color:#f97316;border:1px solid rgba(249,115,22,0.3);padding:3px 8px;border-radius:3px;background:rgba(249,115,22,0.08)}
main{position:relative;z-index:1;max-width:580px;margin:0 auto;padding:24px 16px 80px}
.hero{text-align:center;padding:16px 0 20px}
.hero h1{font-size:1.6rem;font-weight:900;letter-spacing:-0.02em;margin-bottom:6px}
.hero h1 em{color:#f97316;font-style:normal}
.hero p{font-size:0.82rem;color:#55556a;line-height:1.6}
.start-form{background:#0e0e14;border:1px solid rgba(249,115,22,0.15);border-radius:14px;padding:20px;margin-bottom:16px}
.fl{font-family:'Share Tech Mono',monospace;font-size:0.58rem;color:#55556a;letter-spacing:0.1em;margin-bottom:4px;display:block}
.fh{font-family:'Share Tech Mono',monospace;font-size:0.5rem;color:#3a3a50;margin-bottom:8px;display:block}
.fi{width:100%;background:#060608!important;border:1px solid rgba(249,115,22,0.12);border-radius:8px;padding:11px 13px;color:#e2e2e8!important;font-family:'Share Tech Mono',monospace;font-size:0.72rem;outline:none;-webkit-appearance:none;margin-bottom:14px}
.fi::placeholder{color:#33334a!important}
.fi:focus{border-color:rgba(249,115,22,0.35)}
.fi.hl{border-color:rgba(249,115,22,0.4)}
.btn{width:100%;background:#f97316!important;color:#000!important;border:none;border-radius:8px;padding:13px;font-family:'Jost',sans-serif;font-size:0.85rem;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer}
.btn:disabled{opacity:0.35;cursor:not-allowed}
.err{background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:10px 12px;font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:#ef4444;margin-bottom:10px;display:none}
.st{font-family:'Share Tech Mono',monospace;font-size:0.6rem;color:#55556a;text-align:center;padding:6px;min-height:22px}
#chain{display:flex;flex-direction:column}
.tx-card{background:#0e0e14;border:1px solid rgba(249,115,22,0.15);border-radius:14px;overflow:hidden;margin-bottom:0}
.tx-head{padding:13px 16px 10px;border-bottom:1px solid rgba(255,255,255,0.04)}
.tx-hop{font-family:'Share Tech Mono',monospace;font-size:0.52rem;color:#f97316;letter-spacing:0.12em;margin-bottom:3px}
.tx-id{font-family:'Share Tech Mono',monospace;font-size:0.58rem;color:#55556a;word-break:break-all;line-height:1.5}
.tx-time{font-family:'Share Tech Mono',monospace;font-size:0.55rem;color:#3a3a50;margin-top:3px}
.tx-body{padding:13px 16px}
.sec-lbl{font-family:'Share Tech Mono',monospace;font-size:0.5rem;color:#55556a;letter-spacing:0.1em;margin-bottom:5px;text-transform:uppercase}
.row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:8px 11px;background:#16161f;border-radius:7px;margin-bottom:3px}
.row.match{background:rgba(249,115,22,0.06);border:1px solid rgba(249,115,22,0.25)}
.rl{font-family:'Share Tech Mono',monospace;font-size:0.6rem;color:#e2e2e8;word-break:break-all;flex:1;line-height:1.5}
.rr{font-family:'Share Tech Mono',monospace;font-size:0.6rem;color:#55556a;text-align:right;white-space:nowrap;flex-shrink:0}

.tag.o{background:rgba(249,115,22,0.15);color:#f97316;border:1px solid rgba(249,115,22,0.3)}

.next-title{font-family:'Share Tech Mono',monospace;font-size:0.58rem;color:#f97316;letter-spacing:0.08em;margin-bottom:4px}
.next-sub{font-family:'Share Tech Mono',monospace;font-size:0.52rem;color:#55556a;margin-bottom:12px;line-height:1.5}

.wchoice:hover,.wchoice.sel{border-color:rgba(249,115,22,0.35);background:rgba(249,115,22,0.04)}
.wlbl{font-family:'Share Tech Mono',monospace;font-size:0.52rem;color:#55556a;letter-spacing:0.08em;margin-bottom:2px}
.waddr{font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:#e2e2e8;word-break:break-all}
.divider{border:none;border-top:1px solid rgba(255,255,255,0.04);margin:12px 0}
.tx-suggestion{padding:10px 12px;background:#0e0e14;border:1px solid rgba(255,255,255,0.06);border-radius:8px;cursor:pointer;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;gap:8px}

.mixer-title{font-size:1rem;font-weight:800;color:#f97316;margin-bottom:8px}
.mixer-msg{font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:#e2e2e8;margin-bottom:6px;line-height:1.6}
.mixer-sub{font-family:'Share Tech Mono',monospace;font-size:0.55rem;color:#55556a;line-height:1.5;margin-bottom:12px}
.sbtn{width:100%;background:transparent;border:1px solid rgba(249,115,22,0.25);border-radius:8px;padding:11px;font-family:'Jost',sans-serif;font-size:0.78rem;font-weight:700;color:#f97316;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;margin-top:14px;display:none}
.footer-note{text-align:center;font-family:'Share Tech Mono',monospace;font-size:0.5rem;color:#2a2a3a;margin-top:40px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.03)}
</style>

<div class="grid"></div>
<header>
  <div class="logo">
    <img id="bird" src="Normal redi.png" alt="Nodebird"/>
    <div>
      <div class="logo-title">Orditrack</div>

</header>
<main>
  <div class="hero">
    <h1>Follow the <em>Trail</em></h1>
    <p>Track where an Ordinal, token, or BTC went — hop by hop.</p>
  </div>
  <div class="start-form" id="start-form">
    <label class="fl">// WHAT ARE YOU LOOKING FOR? <span style="color:#3a3a50">(optional)</span></label>
    <span class="fh">e.g. inscription ID, "200 DOG", "0.06 BTC"</span>
    <input class="fi" id="target-input" placeholder="Inscription ID, token amount, or BTC…" autocomplete="off" spellcheck="false"/>
    <label class="fl">// TRANSACTION ID <span style="color:#ef4444">*</span></label>
    <input class="fi hl" id="tx-input" placeholder="Paste TX ID here…" autocomplete="off" spellcheck="false"/>

    <button class="btn" id="start-btn" onclick="startInvestigation()">Investigate</button>
    <div class="st" id="start-st"></div>
  </div>
  <div id="chain"></div>
  <button class="sbtn" id="sbtn" onclick="exportTrail()">Export Full Trail</button>
  <div class="footer-note">Read-only · Public blockchain data · No wallet required<br>Powered by N O D E B I R D S</div>
</main>
<script>
const OK = '5007b461-c686-4722-bfeb-9db0ef487d54';
let hops = [];
let target = '';

function bird(s) {
var b = document.getElementById(‘bird’);
if (b) b.src = s === ‘search’ ? ‘Detective.png’ : ‘Normal redi.png’;
}

function trim(s, n) {
n = n || 10;
if (!s) return ‘—’;
if (s.length <= n * 2 + 3) return s;
return s.slice(0, n) + ‘…’ + s.slice(-6);
}

function fmtDate(unix) {
if (!unix) return ‘unconfirmed’;
return new Date(unix * 1000).toISOString().replace(‘T’, ’ ‘).slice(0, 16) + ’ UTC’;
}

function fmtBtc(sats) {
return (sats / 1e8).toFixed(8) + ’ BTC’;
}

async function getTx(txid) {
var r = await fetch(‘https://blockstream.info/api/tx/’ + txid);
if (!r.ok) throw new Error(‘Transaction not found. Check the TX ID.’);
return r.json();
}

async function getAddrTxs(addr) {
try {
var r = await fetch(‘https://blockstream.info/api/address/’ + addr + ‘/txs’);
if (!r.ok) return [];
return r.json();
} catch (e) { return []; }
}

async function getOrdiscan(txid) {
try {
var r = await fetch(‘https://api.ordiscan.com/v1/tx/’ + txid + ‘/inscriptions’, {
headers: { ‘Authorization’: ’Bearer ’ + OK }
});
if (!r.ok) return [];
var d = await r.json();
return d.data || [];
} catch (e) { return []; }
}

function isMixer(tx) {
var ins = tx.vin.length;
var outs = tx.vout.filter(function(o) { return o.scriptpubkey_type !== ‘op_return’; });
if (ins >= 5 && outs.length >= 5) {
var amounts = outs.map(function(o) { return o.value; });
var unique = amounts.filter(function(v, i, a) { return a.indexOf(v) === i; });
if (unique.length <= 2) return ‘Many inputs with equal outputs — possible CoinJoin or mixer.’;
}
if (ins >= 10) return ‘Unusually high number of inputs — possible mixer.’;
return null;
}

function matchesTarget(o, inscriptions, idx) {
if (!target) return false;
var t = target.toLowerCase();
var insc = inscriptions.find(function(i) {
return (i.owner_output && i.owner_output.endsWith(’:’ + idx)) ||
(i.genesis_output && i.genesis_output.endsWith(’:’ + idx));
});
if (insc) {
if (t.indexOf(String(insc.inscription_number)) >= 0) return true;
if (t.indexOf(‘inscription’) >= 0 || t.indexOf(‘ordinal’) >= 0) return true;
if (insc.inscription_id && t.indexOf(insc.inscription_id.toLowerCase().slice(0, 10)) >= 0) return true;
}
var btcStr = (o.value / 1e8).toFixed(8).replace(/0+$/, ‘’).replace(/.$/, ‘’);
if (btcStr && t.indexOf(btcStr) >= 0) return true;
return false;
}

function renderChain() {
var chain = document.getElementById(‘chain’);
chain.innerHTML = ‘’;

hops.forEach(function(hop, i) {
var tx = hop.tx;
var inscriptions = hop.inscriptions;
var senders = tx.vin.map(function(v) { return v.prevout && v.prevout.scriptpubkey_address; }).filter(function(a, i, arr) { return a && arr.indexOf(a) === i; });

  var addr = o.scriptpubkey_address || 'Unknown';
  var insc = inscriptions.find(function(ins) {
    return (ins.owner_output && ins.owner_output.endsWith(':' + idx)) ||

  var isChange = senders.indexOf(addr) >= 0 && !insc;

  var tags = '';
  if (insc) tags = '<span class="tag o">ORDINAL #' + insc.inscription_number + '</span>';
  else if (isChange) tags = '<span class="tag c">CHANGE</span>';
  else tags = '<span class="tag b">BTC</span>';
  var matchLbl = matched ? '<div style="font-family:\'Share Tech Mono\',monospace;font-size:0.5rem;color:#f97316;margin-bottom:2px">★ MATCHES TARGET</div>' : '';
  return '<div class="row' + (matched ? ' match' : '') + '"><div class="rl">' + matchLbl + tags + '<br>' + trim(addr, 14) + '</div><div class="rr">' + fmtBtc(o.value) + '</div></div>';

var feeHTML = tx.fee ? '<div class="row"><div class="rl"><span class="tag f">FEE</span><br>Miner</div><div class="rr">' + fmtBtc(tx.fee) + '</div></div>' : '';

chain.insertAdjacentHTML('beforeend',
  '<div class="tx-card" id="card-' + i + '">' +
    '<div class="tx-head">' +
      '<div class="tx-hop">// HOP ' + (i + 1) + (target ? ' · TRACKING: ' + trim(target, 16) : '') + '</div>' +
      '<div class="tx-id">' + hop.txid + '</div>' +
      '<div class="tx-time">' + fmtDate(tx.status && tx.status.block_time) + '</div>' +
    '</div>' +
    '<div class="tx-body">' +
      '<div style="margin-bottom:10px"><div class="sec-lbl">FROM</div>' + fromHTML + '</div>' +

    '</div>' +
  '</div>'

if (i === hops.length - 1 && hops.length < 10) {
  var mixerWarning = isMixer(tx);
  if (mixerWarning) {
    chain.insertAdjacentHTML('beforeend',
      '<div class="connector"><div class="cline"></div><div class="cdot"></div><div class="cline"></div></div>' +
      '<div class="mixer-card">' +
        '<img id="eb" src="Electric normal.png" style="width:80px;height:80px;image-rendering:pixelated;display:block;margin:0 auto 12px"/>' +
        '<div class="mixer-title">⚡ Trail went cold</div>' +
        '<div class="mixer-msg">' + mixerWarning + '</div>' +
        '<div class="mixer-sub">The trail may be untraceable. You can still try to add the next TX ID manually.</div>' +
        '<input class="fi" id="mixer-input" placeholder="Try next TX ID anyway…" autocomplete="off" spellcheck="false"/>' +
        '<div class="err" id="mixer-err"></div>' +
        '<button class="btn" onclick="addMixerHop()" style="margin-top:8px">Try Anyway</button>' +
      '</div>'

    startElectricPulse();
  } else {
    var allAddrs = tx.vout.filter(function(o) { return o.scriptpubkey_type !== 'op_return' && o.scriptpubkey_address; }).map(function(o) { return o.scriptpubkey_address; });
    var receivers = allAddrs.filter(function(a, i, arr) { return senders.indexOf(a) < 0 && arr.indexOf(a) === i; });
    var walletOpts = senders.map(function(a) { return { addr: a, role: 'Sender' }; }).concat(receivers.map(function(a) { return { addr: a, role: 'Receiver' }; }));

    var wcHTML = walletOpts.map(function(w, wi) {
      return '<div class="wchoice" id="wc-' + i + '-' + wi + '" onclick="pickWallet(' + i + ',' + wi + ',\'' + w.addr + '\')">' +
        '<div class="wlbl">' + w.role + '</div>' +

      '</div>';
    }).join('');

    chain.insertAdjacentHTML('beforeend',

      '<div class="next-box" id="next-' + i + '">' +
        '<div class="next-title">+ FOLLOW THE TRAIL</div>' +
        '<div class="next-sub">Which wallet do you want to follow?</div>' +
        wcHTML +
        '<div id="suggestions-' + i + '" style="display:none">' +
          '<div class="divider"></div>' +
          '<div class="sec-lbl" style="margin-bottom:8px">RECENT TRANSACTIONS — tap to follow</div>' +
          '<div id="txlist-' + i + '"></div>' +
          '<div class="divider"></div>' +
          '<div class="sec-lbl" style="margin-bottom:6px">OR PASTE MANUALLY</div>' +
          '<input class="fi" id="next-input-' + i + '" placeholder="Next TX ID…" autocomplete="off" spellcheck="false"/>' +
          '<div class="err" id="next-err-' + i + '"></div>' +
          '<button class="btn" id="next-btn-' + i + '" onclick="addNextHop(' + i + ')" style="margin-top:8px">Add Next Hop</button>' +
        '</div>' +
      '</div>'
    );
  }
} else if (i < hops.length - 1) {
  chain.insertAdjacentHTML('beforeend', '<div class="connector"><div class="cline"></div><div class="cdot"></div><div class="cline"></div></div>');
}

});

if (hops.length > 1) document.getElementById(‘sbtn’).style.display = ‘block’;
}

function startElectricPulse() {
setInterval(function() {
var eb = document.getElementById(‘eb’);
if (!eb) return;
eb.src = ‘Electric expand.png’;
setTimeout(function() {
var eb2 = document.getElementById(‘eb’);
if (eb2) eb2.src = ‘Electric normal.png’;
}, 800);
}, 3000);
}

async function pickWallet(hopIdx, walletIdx, addr) {
document.querySelectorAll(’[id^=“wc-’ + hopIdx + ‘-”]’).forEach(function(el) { el.classList.remove(‘sel’); });
var wc = document.getElementById(‘wc-’ + hopIdx + ‘-’ + walletIdx);
if (wc) wc.classList.add(‘sel’);

var sugBox = document.getElementById(‘suggestions-’ + hopIdx);
var txList = document.getElementById(‘txlist-’ + hopIdx);
sugBox.style.display = ‘block’;
txList.innerHTML = ‘<div style="font-family:monospace;font-size:0.6rem;color:#55556a;padding:8px">Loading transactions…</div>’;

bird(‘search’);
var txs = await getAddrTxs(addr);
bird(‘normal’);

if (!txs || !txs.length) {
txList.innerHTML = ‘<div style="font-family:monospace;font-size:0.6rem;color:#55556a;padding:8px">No transactions found.</div>’;
return;
}

var recent = txs.slice(0, 5);
txList.innerHTML = recent.map(function(tx) {
var time = (tx.status && tx.status.block_time) ? new Date(tx.status.block_time * 1000).toISOString().slice(0, 10) : ‘unconfirmed’;
var totalOut = tx.vout.reduce(function(s, o) { return s + (o.value || 0); }, 0);
var outAddrs = tx.vout.map(function(o) { return o.scriptpubkey_address; }).filter(function(a) { return a && a !== addr; });
var toStr = outAddrs.length ? trim(outAddrs[0], 10) : ‘—’;
return ‘<div class="tx-suggestion" onclick="selectTx(' + hopIdx + ',\'' + tx.txid + '\')">’ +
‘<div class="ts-left">’ +
‘<div class="ts-date">’ + time + ‘</div>’ +
‘<div class="ts-txid">’ + trim(tx.txid, 14) + ‘</div>’ +
‘<div class="ts-info">→ ’ + toStr + ’ · ’ + (totalOut / 1e8).toFixed(6) + ’ BTC</div>’ +
‘</div>’ +
‘<div class="ts-arr">→</div>’ +
‘</div>’;
}).join(’’);
}

function selectTx(hopIdx, txid) {
addHopByTxid(txid);
}

async function addNextHop(i) {
var inp = document.getElementById(‘next-input-’ + i);
var txid = inp && inp.value.trim();
var errEl = document.getElementById(‘next-err-’ + i);
var btn = document.getElementById(‘next-btn-’ + i);
if (!txid) { if (errEl) { errEl.textContent = ‘Paste a TX ID first.’; errEl.style.display = ‘block’; } return; }
if (errEl) errEl.style.display = ‘none’;
if (btn) btn.disabled = true;
await addHopByTxid(txid);
if (btn) btn.disabled = false;
}

async function addHopByTxid(txid) {
bird(‘search’);
try {
var results = await Promise.all([getTx(txid), getOrdiscan(txid)]);
hops.push({ txid: txid, tx: results[0], inscriptions: results[1] });
renderChain();
setTimeout(function() {
var last = document.getElementById(‘card-’ + (hops.length - 1));
if (last) last.scrollIntoView({ behavior: ‘smooth’, block: ‘start’ });
}, 100);
} catch (e) {
alert(e.message);
}
bird(‘normal’);
}

async function addMixerHop() {
var inp = document.getElementById(‘mixer-input’);
var txid = inp && inp.value.trim();
var errEl = document.getElementById(‘mixer-err’);
if (!txid) { if (errEl) { errEl.textContent = ‘Paste a TX ID.’; errEl.style.display = ‘block’; } return; }
if (errEl) errEl.style.display = ‘none’;
await addHopByTxid(txid);
}

async function startInvestigation() {
target = document.getElementById(‘target-input’).value.trim();
var txid = document.getElementById(‘tx-input’).value.trim();
var errEl = document.getElementById(‘start-err’);
var stEl = document.getElementById(‘start-st’);
errEl.style.display = ‘none’;
if (!txid) { errEl.textContent = ‘Paste a Transaction ID first.’; errEl.style.display = ‘block’; return; }
document.getElementById(‘start-btn’).disabled = true;
stEl.textContent = ‘Loading transaction…’;
bird(‘search’);
try {
var results = await Promise.all([getTx(txid), getOrdiscan(txid)]);
hops = [{ txid: txid, tx: results[0], inscriptions: results[1] }];
document.getElementById(‘start-form’).style.display = ‘none’;
renderChain();
} catch (e) {
errEl.textContent = e.message;
errEl.style.display = ‘block’;
}
document.getElementById(‘start-btn’).disabled = false;
stEl.textContent = ‘’;
bird(‘normal’);
}

function exportTrail() {
var txt = ‘ORDITRACK — TRAIL SUMMARY\n’;
if (target) txt += ’Looking for: ’ + target + ‘\n’;
txt += ‘\n’;
hops.forEach(function(hop, i) {
var tx = hop.tx;
var senders = tx.vin.map(function(v) { return v.prevout && v.prevout.scriptpubkey_address; }).filter(Boolean);
txt += ‘HOP ’ + (i + 1) + ‘\nTX: ’ + hop.txid + ‘\nTime: ’ + fmtDate(tx.status && tx.status.block_time) + ‘\nFrom: ’ + senders.join(’, ‘) + ‘\n’;
tx.vout.forEach(function(o, idx) {
if (o.scriptpubkey_type === ‘op_return’) return;
var insc = hop.inscriptions.find(function(ins) { return (ins.owner_output && ins.owner_output.endsWith(’:’ + idx)) || (ins.genesis_output && ins.genesis_output.endsWith(’:’ + idx)); });
txt += ’  -> ’ + (o.scriptpubkey_address || ‘Unknown’) + ‘: ’ + fmtBtc(o.value) + (insc ? ’ [ORDINAL #’ + insc.inscription_number + ‘]’ : ‘’) + ‘\n’;
});
if (tx.fee) txt += ’Fee: ’ + fmtBtc(tx.fee) + ‘\n’;
txt += ‘\n’;
});
var a = document.createElement(‘a’);
a.href = URL.createObjectURL(new Blob([txt], { type: ‘text/plain’ }));
a.download = ‘orditrack-trail.txt’;
a.click();
}

document.getElementById(‘tx-input’).addEventListener(‘keydown’, function(e) { if (e.key === ‘Enter’) startInvestigation(); });
</script>
